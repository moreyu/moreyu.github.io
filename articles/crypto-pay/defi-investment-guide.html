                        <section id="yield-farming" >
                            <h2 >流动性挖矿实战</h2>

                            <h3 >什么是流动性挖矿</h3>

                            <p >
                                流动性挖矿（Yield Farming）是指向DeFi协议提供流动性，获取交易手续费和代币奖励的过程。这是DeFi中最主要的收益来源之一。
                            </p>

                            <div>
                                <h4 >收益计算示例</h4>
                                <div>
                                    <p >场景：在Uniswap ETH/USDC池提供$10,000流动性</p>
                                    <div>
                                        <div>
                                            <p ><strong>收益来源：</strong></p>
                                            <ul >
                                                <li>• 交易手续费：0.3% × 日交易量</li>
                                                <li>• 假设池子日交易量：$1,000,000</li>
                                                <li>• 你的份额：1%（$10,000/$1,000,000）</li>
                                                <li>• 日收益：$1,000,000 × 0.3% × 1% = $30</li>
                                            </ul>
                                        </div>
                                        <div>
                                            <p ><strong>年化收益：</strong></p>
                                            <ul >
                                                <li>• 日收益：$30</li>
                                                <li>• 年收益：$30 × 365 = $10,950</li>
                                                <li>• APY：$10,950 / $10,000 = 109.5%</li>
                                                <li>• 实际APY会因交易量波动</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <p ><strong>注意：</strong>以上计算未考虑无常损失、Gas费和代币价格波动。</p>
                                </div>
                            </div>

                                    <li>• <strong>准备Gas费：</strong>确保有足够ETH支付Gas</li>
