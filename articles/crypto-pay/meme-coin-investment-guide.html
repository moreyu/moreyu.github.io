                        <section id="risk-management" >
                            <h2 >风险控制体系</h2>

                            <div>
                                <p >⚠️ 核心原则</p>
                                <p>在Meme币投资中，风险控制比收益更重要。保住本金，才有继续游戏的资格。</p>
                            </div>

                            <h3 >资金管理</h3>

                            <div>
                                <div>
                                    <h4 >总资金配置</h4>
                                    <ul >
                                        <li>• Meme币投资≤总资产的10%</li>
                                        <li>• 单个项目≤Meme资金的5%</li>
                                        <li>• 新项目≤Meme资金的2%</li>
                                        <li>• 保持30%现金储备</li>
                                    </ul>
                                </div>

                                <div>
                                    <h4 >止损规则</h4>
                                    <ul >
                                        <li>• 单笔亏损达-50%立即止损</li>
                                        <li>• 日亏损达-20%停止交易</li>
                                        <li>• 周亏损达-30%暂停一周</li>
                                        <li>• 月亏损达-40%退出市场</li>
                                    </ul>
                                </div>

                                <div>
                                    <h4 >止盈策略</h4>
                                    <ul >
                                        <li>• 2x：卖出50%回本</li>
                                        <li>• 5x：卖出30%锁定利润</li>
                                        <li>• 10x：卖出20%继续持有</li>
                                        <li>• 20x+：分批全部卖出</li>
                                    </ul>
                                </div>
                            </div>

                            <h3 >常见陷阱与应对</h3>

                            <div>
                                <div>
                                    <h4 >🎣 Rug Pull（跑路）</h4>
                                    <p >项目方撤除流动性，投资者无法卖出</p>
                                    <div>
                                        <p ><strong>识别方法：</strong></p>
                                        <ul >
                                            <li>• 检查流动性锁定状态</li>
                                            <li>• 查看开发者钱包持币比例</li>
                                            <li>• 观察交易对流动性变化</li>
                                        </ul>
                                    </div>
                                    <p ><strong>应对：</strong>只投资流动性已锁定的项目</p>
                                </div>

                                <div>
                                    <h4 >🍯 蜜罐合约</h4>
                                    <p >只能买入无法卖出的恶意合约</p>
                                    <div>
                                        <p ><strong>识别方法：</strong></p>
                                        <ul >
                                            <li>• 使用合约检测工具</li>
                                            <li>• 测试小额买卖</li>
                                            <li>• 查看其他人交易记录</li>
                                        </ul>
                                    </div>
                                    <p ><strong>应对：</strong>购买前必须进行合约检测</p>
                                </div>

                                <div>
                                    <h4 >🤖 机器人狙击</h4>
                                    <p >专业机器人在发布瞬间大量买入</p>
                                    <div>
                                        <p ><strong>识别方法：</strong></p>
                                        <ul >
                                            <li>• 查看首批交易时间间隔</li>
                                            <li>• 观察大额买入模式</li>
                                            <li>• 分析持币地址特征</li>
                                        </ul>
                                    </div>
                                    <p ><strong>应对：</strong>避开发布初期，等待稳定后进入</p>
                                </div>

                                <div>
                                    <h4 >📢 虚假宣传</h4>
                                    <p >夸大项目前景，制造FOMO情绪</p>
                                    <div>
                                        <p ><strong>识别方法：</strong></p>
                                        <ul >
                                            <li>• 核实合作伙伴真实性</li>
                                            <li>• 查证团队成员背景</li>
                                            <li>• 验证技术实现可行性</li>
                                        </ul>
                                    </div>
                                    <p ><strong>应对：</strong>独立调研，不轻信宣传</p>
                                </div>

                                <div>
                                    <h4 >🐋 巨鲸操纵</h4>
                                    <p >大户通过买卖操纵价格收割散户</p>
                                    <div>
                                        <p ><strong>识别方法：</strong></p>
                                        <ul >
                                            <li>• 监控大额交易</li>
                                            <li>• 分析持币集中度</li>
                                            <li>• 观察价格异常波动</li>
                                        </ul>
                                    </div>
                                    <p ><strong>应对：</strong>避开持币过度集中的项目</p>
                                </div>

                                <div>
                                    <h4 >😱 FOMO情绪</h4>
                                    <p >害怕错过机会而盲目追高</p>
                                    <div>
                                        <p ><strong>识别方法：</strong></p>
                                        <ul >
                                            <li>• 自我情绪监控</li>
                                            <li>• 检查决策是否理性</li>
                                            <li>• 评估风险收益比</li>
                                        </ul>
                                    </div>
                                    <p ><strong>应对：</strong>制定交易计划，严格执行</p>
                                </div>
                            </div>

                            <div>
                                <div>
                                    <h4 >✅ 正确心态</h4>
                                    <ul >
