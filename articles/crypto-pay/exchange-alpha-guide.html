<body>

        window.location.href = 'exchange-alpha-strategy.html';
    </script>
    <script src="../../scripts/article-enhancements.js"></script>

    <!-- LDR Easter Egg -->
    <div class="ldr-hidden-message" id="ldr-message"></div>

    <script>
        // LDR Easter Egg - Triple click anywhere
        let clickCount = 0;
        let clickTimer;

        document.addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);

            if (clickCount === 3) {
                const messages = [
                    '💀 LOVE, DEATH & ROBOTS 🤖',
                    '🎬 "When the yogurt took over..."',
                    '⚡ "Good hunting, Sonnie!"',
                    '🌌 "Zima Blue"',
                    '🦾 "Three Robots"',
                    '✈️ "Lucky 13"'
                ];
                const msg = messages[Math.floor(Math.random() * messages.length)];
                const ldrMsg = document.getElementById('ldr-message');
                ldrMsg.textContent = msg;
                ldrMsg.classList.add('show');

                setTimeout(() => {
                    ldrMsg.classList.remove('show');
                }, 3000);

                clickCount = 0;
            }

            clickTimer = setTimeout(() => {
                clickCount = 0;
            }, 500);
        });

    </script>
</body>
