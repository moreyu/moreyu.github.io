                        <h2>为什么选择 Plex？</h2>
                        <p>

                        </p>
                        <p>
                            于是我开始研究自建媒体服务器。对比了 Jellyfin、Emby 和 Plex 后，最终选择了 Plex：
                        </p>
                        <ul>
                            <li><strong>客户端体验最好</strong> - iOS/Android/Apple TV/Roku 全平台支持，UI 设计接近商业水准</li>

                        <h2>硬件选择：从树莓派到 NAS</h2>

                        <h3>第一代：树莓派 4B（2023.03 - 2023.06）</h3>
                        <p>
                            最开始我用树莓派 4B（8GB 内存）+ 2TB 移动硬盘搭建 Plex。配置很简单，Docker 一键部署，成本不到 1000 元。

                        </p>
                        <ul>
                            <li>✅ 直接播放（Direct Play）完美 - 1080p H.264 视频流畅</li>
                            <li>❌ 转码能力为零 - 遇到 HEVC/H.265 或 4K 视频直接卡死</li>
                            <li>❌ 移动硬盘供电不稳 - 经常出现 I/O 错误，数据库损坏过两次</li>
                        </ul>
                        <p>
                            用了三个月后，我意识到树莓派只适合做轻量级 NAS，跑 Plex 太勉强了。尤其是家里有 4K 电视后，转码需求变得刚需。
                        </p>

                        <h3>第二代：群晖 DS920+（2023.06 - 2024.11）</h3>
                        <p>
                            咬牙买了群晖 DS920+（Intel Celeron J4125，双核四线程）+ 2 × 4TB WD Red。这台 NAS 自带 Intel Quick Sync，理论上可以硬件转码。
                        </p>

                        </p>

                            <li>开启硬件转码（需要 Plex Pass）</li>
                            <li>设置 RAID 1（镜像模式），实际可用空间 4TB</li>
                        </ol>
                        <p>
                            <strong>实际体验：</strong>
                        </p>
                        <ul>
                            <li>✅ 1080p HEVC 转码流畅 - 可以同时转码 2-3 路</li>
                            <li>✅ 数据安全性高 - RAID 1 + Btrfs 文件系统，再也没出现过数据丢失</li>
                            <li>⚠️ 4K HDR 转码吃力 - J4125 的 Quick Sync 只支持到 8bit，HDR 转 SDR 效果很差</li>
                            <li>❌ 远程访问速度慢 - 家里是 100Mbps 上行，外网看 1080p 经常卡顿</li>

                            <strong>为什么选 P400？</strong>
                        </p>

                            <li>功耗低（30W TDP），无需外接供电</li>

                            <li>二手价格便宜（300-400 元）</li>

                        </p>

                            <li>✅ 功耗控制优秀 - 整机待机 25W，满载转码 55W</li>
                            <li>✅ 存储空间充足 - 12TB 可用空间，目前用了 8TB</li>
                            <li>✅ 系统稳定性高 - Ubuntu + ZFS，运行半年零故障</li>

                        <h2>Plex 安装与配置</h2>

                        <h3>Docker 部署（推荐）</h3>
                        <p>
                            我使用 Docker Compose 部署 Plex，方便管理和备份。
                        </p>
                        <pre dangerouslySetInnerHTML={{__html: `<code>version: '3.8'

services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    network_mode: host
    environment:
      - TZ=Asia/Shanghai
      - PLEX_UID=1000
      - PLEX_GID=1000
      - PLEX_CLAIM=claim-xxxxxxxxxxxx  # 从 plex.tv/claim 获取
    volumes:
      - /data/plex/config:/config
      - /data/plex/transcode:/transcode
      - /data/media:/data:ro
    devices:
      - /dev/dri:/dev/dri  # Intel Quick Sync
    restart: unless-stopped

  # NVIDIA GPU 支持（如果使用 NVIDIA 显卡）
  plex-nvidia:
    image: plexinc/pms-docker:latest
    container_name: plex
    network_mode: host
    environment:
      - TZ=Asia/Shanghai
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - /data/plex/config:/config
      - /data/plex/transcode:/transcode
      - /data/media:/data:ro
    runtime: nvidia
    restart: unless-stopped</code>`}} />

                        <p>
                            <strong>关键配置说明：</strong>
                        </p>
                        <ul>
                            <li><code>network_mode: host</code> - 使用宿主机网络，避免端口映射问题</li>
                            <li><code>PLEX_CLAIM</code> - 首次启动时绑定 Plex 账号，从 <a href="https://www.plex.tv/claim/" target="_blank">plex.tv/claim</a> 获取（4 分钟有效期）</li>
                            <li><code>/dev/dri</code> - 映射 Intel Quick Sync 设备</li>
                            <li><code>runtime: nvidia</code> - 启用 NVIDIA GPU 支持（需要安装 nvidia-docker2）</li>
                        </ul>

                        <h3>NVIDIA 驱动配置</h3>

                            如果使用 NVIDIA 显卡，需要安装驱动和 nvidia-docker2：
                        </p>
                        <pre dangerouslySetInnerHTML={{__html: `<code># 安装 NVIDIA 驱动
sudo apt update
sudo apt install nvidia-driver-535

# 安装 nvidia-docker2
distribution=$(. /etc/os-release;echo $ID$VERSION_ID)
curl -s -L https://nvidia.github.io/nvidia-docker/gpgkey | sudo apt-key add -
curl -s -L https://nvidia.github.io/nvidia-docker/$distribution/nvidia-docker.list | \
  sudo tee /etc/apt/sources.list.d/nvidia-docker.list

sudo apt update
sudo apt install nvidia-docker2
sudo systemctl restart docker

# 验证 GPU 可用
docker run --rm --gpus all nvidia/cuda:11.8.0-base-ubuntu22.04 nvidia-smi</code>`}} />

git clone https://github.com/keylase/nvidia-patch.git
cd nvidia-patch

# 运行补丁（需要 root 权限）
sudo bash ./patch.sh

# 重启系统
sudo reboot</code>`}} />

                        <h3>媒体库设置</h3>

├── Movies/

                        </ul>

                        <h2>转码优化：榨干硬件性能</h2>

                        <h3>开启硬件转码</h3>
                        <p>
                            进入 Plex 设置 → 转码器（Transcoder）：
                        </p>
                        <ul>
                            <li>✅ 使用硬件加速（需要 Plex Pass）</li>
                            <li>转码临时目录：<code>/transcode</code>（建议使用 SSD 或 RAM Disk）</li>
                            <li>转码质量：自动（Automatic）</li>
                            <li>✅ 使用硬件加速进行视频上传（如果支持）</li>
                        </ul>

                        <h3>RAM Disk 加速转码</h3>
                        <p>
                            转码过程会产生大量临时文件，使用 RAM Disk 可以显著提升性能：
                        </p>
                        <pre dangerouslySetInnerHTML={{__html: `<code># 创建 8GB RAM Disk
sudo mkdir -p /mnt/ramdisk
sudo mount -t tmpfs -o size=8G tmpfs /mnt/ramdisk

# 开机自动挂载（编辑 /etc/fstab）
tmpfs /mnt/ramdisk tmpfs defaults,size=8G 0 0

# 修改 Docker Compose 配置
volumes:
  - /mnt/ramdisk:/transcode</code>`}} />

                        <h3>转码参数调优</h3>
                        <p>
                            Plex 的转码参数可以通过环境变量调整：
                        </p>
                        <pre dangerouslySetInnerHTML={{__html: `<code>environment:
  - TRANSCODE_THREADS=4  # 转码线程数
  - TRANSCODE_THROTTLE_BUFFER=600  # 转码缓冲时间（秒）</code>`}} />

                        <h2>远程访问：突破内网限制</h2>

                        <h3>方案一：Plex Relay（最简单）</h3>
                        <p>
                            Plex 自带 Relay 服务，无需配置端口转发，但速度较慢（限速 1Mbps）。
                        </p>
                        <p>
                            <strong>适用场景：</strong>应急访问、低码率视频
                        </p>

                        <h3>方案二：端口转发（推荐）</h3>
                        <p>
                            在路由器上配置端口转发，将外网 32400 端口映射到 NAS 的 32400 端口。
                        </p>
                        <p>
                            <strong>步骤：</strong>
                        </p>
                        <ol>
                            <li>登录路由器管理界面</li>
                            <li>找到"端口转发"或"虚拟服务器"设置</li>
                            <li>添加规则：外部端口 32400 → 内部 IP（NAS）端口 32400</li>
                            <li>在 Plex 设置中手动指定公网端口：32400</li>
                        </ol>
                        <p>
                            <strong>注意：</strong>需要公网 IP，如果是运营商 NAT，需要联系客服申请公网 IP。
                        </p>

                        <h3>方案三：Cloudflare Tunnel（无需公网 IP）</h3>
                        <p>
                            如果没有公网 IP，可以使用 Cloudflare Tunnel 实现内网穿透：
                        </p>
                        <pre dangerouslySetInnerHTML={{__html: `<code># 安装 cloudflared
wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
sudo dpkg -i cloudflared-linux-amd64.deb

# 登录 Cloudflare
cloudflared tunnel login

# 创建隧道
cloudflared tunnel create plex

# 配置隧道（~/.cloudflared/config.yml）
tunnel: {'<'}TUNNEL_ID{'>'}
credentials-file: /root/.cloudflared/{'<'}TUNNEL_ID{'>'}.json

ingress:
  - hostname: plex.yourdomain.com
    service: http://localhost:32400
  - service: http_status:404

# 启动隧道
cloudflared tunnel run plex</code>`}} />

                        <p>
                            <strong>优点：</strong>无需公网 IP，支持 HTTPS<br />
                            <strong>缺点：</strong>速度受 Cloudflare 节点影响，可能不如直连
                        </p>

                        <h2>字幕管理：告别手动下载</h2>

                        <h3>Sub-Zero 插件（已停更）</h3>
                        <p>
                            Sub-Zero 曾经是 Plex 最好的字幕插件，但 2020 年后停止维护。如果你还在用旧版 Plex，可以继续使用。
                        </p>

                        <h3>Bazarr（推荐）</h3>
                        <p>
                            Bazarr 是独立的字幕管理工具，支持 Plex、Emby、Jellyfin。
                        </p>
                        <pre dangerouslySetInnerHTML={{__html: `<code>version: '3.8'

services:
  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
    volumes:
      - /data/bazarr/config:/config
      - /data/media:/data
    ports:
      - 6767:6767
    restart: unless-stopped</code>`}} />

                        <p>
                            <strong>配置步骤：</strong>
                        </p>
                        <ol>
                            <li>访问 <code>http://NAS_IP:6767</code></li>
                            <li>连接 Plex（需要 Plex Token）</li>
                            <li>添加字幕源：OpenSubtitles、Subscene、射手网</li>
                            <li>设置自动下载规则：中文 + 英文字幕</li>
                        </ol>

                        <h2>常见问题与解决方案</h2>

                        <h3>1. 转码失败：Conversion failed</h3>
                        <p>
                            <strong>原因：</strong>硬件转码驱动问题或权限不足
                        </p>
                        <p>
                            <strong>解决：</strong>
                        </p>
                        <pre dangerouslySetInnerHTML={{__html: `<code># 检查 GPU 是否可用
docker exec -it plex nvidia-smi  # NVIDIA
docker exec -it plex ls -l /dev/dri  # Intel

# 确保 Plex 用户有权限访问 GPU
sudo usermod -aG video plex
sudo usermod -aG render plex</code>`}} />

                        <h3>2. 远程访问显示"不可用"</h3>
                        <p>
                            <strong>原因：</strong>端口转发配置错误或防火墙拦截
                        </p>
                        <p>
                            <strong>解决：</strong>
                        </p>
                        <pre dangerouslySetInnerHTML={{__html: `<code># 检查端口是否开放
sudo ufw allow 32400/tcp

# 测试端口连通性
curl -I http://YOUR_PUBLIC_IP:32400/web</code>`}} />

                        <h3>3. 元数据刮削失败</h3>
                        <p>
                            <strong>原因：</strong>文件命名不规范或网络问题
                        </p>
                        <p>
                            <strong>解决：</strong>
                        </p>
                        <ul>
                            <li>检查文件命名是否符合规范</li>
                            <li>手动匹配：点击电影 → "修复匹配" → 搜索正确的 TMDB ID</li>
                            <li>配置代理：Plex 设置 → 网络 → 代理服务器</li>
                        </ul>

                        <h3>4. 4K HDR 转 SDR 色彩失真</h3>
                        <p>
                            <strong>原因：</strong>硬件转码不支持 HDR Tone Mapping
                        </p>
                        <p>
                            <strong>解决：</strong>
                        </p>
                        <ul>
                            <li>使用 NVIDIA GPU（P400 及以上）</li>
                            <li>或者准备两个版本：4K HDR（直接播放）+ 1080p SDR（转码）</li>
                        </ul>

                        <h2>进阶玩法</h2>

                        <h3>1. 自动化下载：Sonarr + Radarr</h3>
                        <p>
                            配合 Sonarr（电视剧）和 Radarr（电影）实现自动追剧：
                        </p>
                        <ul>
                            <li>监控 TMDB/TVDB 新剧集发布</li>
                            <li>自动搜索种子并下载</li>
                            <li>下载完成后通知 Plex 刷新媒体库</li>
                        </ul>

                        <h3>2. 多用户管理</h3>
                        <p>
                            Plex 支持创建多个用户账号，每个用户可以单独设置权限：
                        </p>
                        <ul>
                            <li>限制访问特定媒体库（例如：儿童账号只能看动画）</li>
                            <li>限制转码质量（节省带宽）</li>

                        </ul>

                        </p>

                        </p>

                        </p>
