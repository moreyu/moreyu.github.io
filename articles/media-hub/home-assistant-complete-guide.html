    <script>
        // Mobile menu toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const desktopNav = document.getElementById('desktop-nav');

        // Show/hide mobile menu button based on screen size
        function updateNavDisplay() {
            if (window.innerWidth < 768) {
                mobileMenuBtn.style.display = 'block';
                desktopNav.style.display = 'none';
            } else {
                mobileMenuBtn.style.display = 'none';
                desktopNav.style.display = 'flex';
                mobileMenu.style.display = 'none';
            }
        }

        mobileMenuBtn.addEventListener('click', () => {
            if (mobileMenu.style.display === 'none' || !mobileMenu.style.display) {
                mobileMenu.style.display = 'block';
                mobileMenuBtn.querySelector('svg').innerHTML = '<path d="M6 18L18 6M6 6l12 12"/>';
            } else {
                mobileMenu.style.display = 'none';
                mobileMenuBtn.querySelector('svg').innerHTML = '<path d="M4 6h16M4 12h16M4 18h16"/>';
            }
        });

        // Close mobile menu when clicking a link
        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.style.display = 'none';
                mobileMenuBtn.querySelector('svg').innerHTML = '<path d="M4 6h16M4 12h16M4 18h16"/>';
            });
        });

        window.addEventListener('resize', updateNavDisplay);
        updateNavDisplay();
    </script>

            <script type="text/babel">
        const { useState, useEffect } = React;

        function Article() {
            return (
                <article className="article-container">
                    <header className="article-header">
                        <div className="article-meta">
                            <span className="category">STREAM & SMART MEDIA HUB</span>
                            <time>2026-04-29</time>
                        </div>
                        <h1>Home Assistant 从入门到智能家居全屋控制</h1>
                        <p className="article-intro">
                            从零开始搭建 Home Assistant，实现全屋智能控制的完整指南
                        </p>
                    </header>

                    <div className="article-content">
                        <strong>️ 遇到的问题：</strong>
            <p style={{marginBottom: '0.5rem'}}>用了两个月后，SD 卡突然挂了，所有配置都没了。虽然有备份，但恢复起来还是很麻烦。后来换了 SSD，但树莓派的 USB 启动有点玄学，折腾了一晚上才搞定。</p>
        </div>

        <h3>方案二：N100 小主机</h3>

        <p>树莓派的性能还是有点吃紧，特别是装了一堆插件之后，打开界面都要等好几秒。正好看到群里有人推荐 N100 小主机，拼多多 700 块，16GB 内存 + 512GB SSD，性能吊打树莓派。</p>

        <p>装的是 Proxmox VE，然后在虚拟机里跑 HA。这样的好处是可以同时跑其他服务，比如 AdGuard Home、Nginx Proxy Manager 之类的。</p>

        <div>
            <strong> 最终方案：</strong>
            <p style={{marginBottom: 0}}>N100 小主机 + Proxmox VE + Home Assistant OS 虚拟机。稳定运行半年了，没出过问题。功耗也不高，满载也就 15W，待机只有 6W。</p>
        </div>

        <h2>安装 Home Assistant OS</h2>

        <p>如果你用的是树莓派，直接用 Raspberry Pi Imager 烧录官方镜像就行。如果是 x86 主机，需要在 Proxmox 里创建虚拟机。</p>

        <h3>Proxmox 安装 HA 的步骤</h3>

        <p>1. 下载 HA 的 QCOW2 镜像（官网有下载链接）</p>

        <p>2. 上传到 Proxmox，然后用命令导入：</p>

        <pre><code># 解压镜像
xz -d haos_ova-11.2.qcow2.xz

# 创建虚拟机（ID 100）
qm create 100 --name homeassistant --memory 4096 --cores 2 --net0 virtio,bridge=vmbr0

# 导入磁盘
qm importdisk 100 haos_ova-11.2.qcow2 local-lvm

# 挂载磁盘
qm set 100 --scsihw virtio-scsi-pci --scsi0 local-lvm:vm-100-disk-0

# 设置启动顺序
qm set 100 --boot c --bootdisk scsi0

# 启动虚拟机
qm start 100</code></pre>

        <div>
            <strong>️ 踩坑记录：</strong>
            <p>第一次装的时候，虚拟机一直卡在启动界面。后来发现是 CPU 类型选错了，要选 <code>host</code> 而不是 <code>kvm64</code>。还有就是内存至少要给 2GB，不然会很卡。</p>
        </div>

        <p>3. 等待 5-10 分钟，系统会自动安装。然后在浏览器打开 <code>http://homeassistant.local:8123</code> 就能看到欢迎界面了。</p>

        <h2>初始配置：让 HA 跑起来</h2>

        <p>第一次打开 HA，会有一个引导流程，创建账号、设置位置、时区之类的。这些都很简单，按提示操作就行。</p>

        <h3>安装 HACS（必装）</h3>

        <p>HACS 是 Home Assistant Community Store 的缩写，相当于一个第三方插件商店。很多好用的集成和主题都在这里，强烈建议第一时间装上。</p>

        <p>安装方法：</p>

        <ol>
            <li>SSH 进入 HA（需要先装 SSH 插件）</li>
            <li>运行安装脚本：</li>
        </ol>

        <pre><code>wget -O - https://get.hacs.xyz | bash -</code></pre>

        <ol start="3">
            <li>重启 HA</li>
            <li>在"配置" → "集成"里搜索 HACS，按提示授权 GitHub 账号</li>
        </ol>

        <div>
            <strong> 小技巧：</strong>
            <p style={{marginBottom: 0}}>如果 GitHub 访问慢，可以用 Cloudflare WARP 或者改 hosts。我是在路由器上装了 Clash，直接全局代理，速度飞快。</p>
        </div>

        <h2>接入设备：从米家到 Aqara</h2>

        <p>HA 支持的设备非常多，但不同品牌的接入方式不一样。我主要用的是米家和 Aqara 的设备，下面分别说说怎么接入。</p>

        <h3>米家设备接入</h3>

        <p>米家设备有两种接入方式：</p>

        <p><strong>方式一：Xiaomi Miot Auto（推荐）</strong></p>

        <p>这是 HACS 里的一个插件，可以自动发现局域网内的米家设备。安装方法：</p>

        <ol>
            <li>在 HACS 里搜索"Xiaomi Miot Auto"，点击下载</li>
            <li>重启 HA</li>
            <li>在"配置" → "集成"里添加"Xiaomi Miot Auto"</li>
            <li>输入小米账号和密码（会获取设备列表）</li>
        </ol>

        <p>这个插件的好处是支持云端控制，即使设备不在局域网也能控制。而且支持的设备很全，基本上米家的设备都能接入。</p>

        <div>
            <strong>️ 遇到的问题：</strong>
            <p>有些设备（比如空调伴侣）需要开启局域网控制才能用。在米家 App 里找到设备，进入设置，开启"局域网控制"。还有就是要记下设备的 Token，有些设备需要手动填。</p>
            <p style={{marginBottom: 0}}>获取 Token 的方法：用抓包工具（比如 Charles）抓米家 App 的请求，或者用小米云服务的 API。我是用的后者，写了个 Python 脚本批量获取。</p>
        </div>

        <p><strong>方式二：HomeKit Controller</strong></p>

        <p>如果设备支持 HomeKit（比如 Aqara 的网关），可以直接用 HomeKit Controller 接入。这种方式是本地控制，不需要云端，响应速度更快。</p>

        <h3>Aqara 设备接入</h3>

        <p>Aqara 的设备需要通过网关接入。我用的是 Aqara M2 网关，支持 Zigbee 3.0。</p>

        <p>接入步骤：</p>

        <ol>
            <li>在 Aqara App 里添加网关和设备</li>
            <li>在网关设置里开启"HomeKit 模式"（会生成一个配对码）</li>
            <li>在 HA 里添加"HomeKit Controller"集成</li>
            <li>输入配对码，等待设备同步</li>
        </ol>

        <p>这样接入的好处是完全本地控制，不需要经过 Aqara 的服务器。而且响应速度很快，门窗传感器触发到灯亮起，延迟不到 100ms。</p>

        <h2>自动化场景：让家真正"智能"起来</h2>

        <p>接入设备只是第一步，真正让家智能起来的是自动化。HA 的自动化功能非常强大，可以实现各种复杂的逻辑。</p>

        <h3>场景一：回家自动开灯</h3>

        <p>这是最基础的场景。我的实现方式是：</p>

        <ul>
            <li><strong>触发条件</strong>：手机连接到家里的 WiFi</li>
            <li><strong>条件判断</strong>：当前时间在日落之后</li>
            <li><strong>执行动作</strong>：打开玄关灯和客厅灯</li>
        </ul>

        <p>配置代码：</p>

        <pre><code>automation:
  - alias: "回家开灯"
    trigger:
      - platform: state
        entity_id: device_tracker.iphone
        to: "home"
    condition:
      - condition: sun
        after: sunset
    action:
      - service: light.turn_on
        target:
          entity_id:
            - light.entrance
            - light.living_room
        data:
          brightness_pct: 80</code></pre>

        <div>
            <strong> 优化技巧：</strong>
            <p style={{marginBottom: 0}}>后来我加了一个条件：如果家里已经有人（通过其他设备判断），就不开灯。这样可以避免重复触发。还有就是亮度可以根据时间动态调整，晚上 10 点后只开 30% 亮度，不刺眼。</p>
        </div>

        <h3>场景二：睡眠模式</h3>

        <p>这个场景是我最满意的。晚上 11 点后，如果检测到卧室门关闭，就自动进入睡眠模式：</p>

        <ul>
            <li>关闭所有灯光（除了小夜灯）</li>
            <li>空调设置为睡眠模式（26度，静音）</li>
            <li>关闭客厅的电视和音响</li>
            <li>启动空气净化器（自动模式）</li>
            <li>手机进入勿扰模式（通过 iOS 快捷指令）</li>
        </ul>

        <p>早上 7 点，如果检测到卧室有人移动（通过人体传感器），就自动退出睡眠模式，窗帘缓慢打开，播放轻音乐。</p>

        <div>
            <strong>️ 踩坑记录：</strong>
            <p style={{marginBottom: 0}}>最开始用的是时间触发，结果有时候 11 点还没睡，灯就自动关了，很尴尬。后来改成门窗传感器 + 时间条件，体验好多了。还有就是空调的控制，米家的空调伴侣有时候会失联，需要加个重试逻辑。</p>
        </div>

        <h3>场景三：离家模式</h3>

        <p>这个场景是用来省电和安全的。当检测到所有人都离开家（通过手机定位），就自动：</p>

        <ul>
            <li>关闭所有灯光和电器</li>
            <li>空调设置为离家模式（28度，节能）</li>
            <li>启动扫地机器人（如果是工作日）</li>
            <li>开启安防模式（门窗传感器触发时发送通知）</li>
        </ul>

        <p>回家时自动退出离家模式，恢复之前的状态。</p>

        <h2>进阶玩法：Node-RED 和语音控制</h2>

        <h3>Node-RED：可视化编程</h3>

        <p>HA 自带的自动化编辑器对于复杂逻辑来说还是有点吃力。Node-RED 是一个可视化编程工具，可以用拖拽的方式创建自动化流程。</p>

        <p>安装方法：在 HA 的"插件商店"里搜索"Node-RED"，点击安装。</p>

        <p>我用 Node-RED 做了一个"智能浇花"的自动化：</p>

        <ol>
            <li>每天早上 8 点检查土壤湿度传感器</li>
            <li>如果湿度低于 30%，发送通知提醒浇花</li>
            <li>如果连续 3 天湿度都低于 30%，自动启动浇水泵（浇水 30 秒）</li>
            <li>浇水后记录到数据库，可以在 Grafana 里查看历史数据</li>
        </ol>

        <p>这种复杂的逻辑用 HA 自带的编辑器很难实现，但在 Node-RED 里就很直观。</p>

        <h3>语音控制：接入小爱同学</h3>

        <p>虽然 HA 有自己的语音助手，但说实话体验一般。我还是用的小爱同学，通过 HACS 里的"Xiaomi Miot Auto"插件可以把 HA 的设备同步到米家，然后就能用小爱控制了。</p>

        <p>常用的语音指令：</p>

        <ul>
            <li>"小爱同学，打开客厅灯"</li>
            <li>"小爱同学，把卧室空调设置为 26 度"</li>
            <li>"小爱同学，启动睡眠模式"（需要在米家里创建场景）</li>
        </ul>

        <div>
            <strong> 小技巧：</strong>
            <p style={{marginBottom: 0}}>可以在 HA 里创建"脚本"（Script），然后同步到米家作为"场景"。这样就能用语音触发复杂的自动化流程了。比如"小爱同学，我要看电影"，就会自动关灯、拉窗帘、打开投影仪。</p>
        </div>

        <h2>数据可视化：Grafana 和 InfluxDB</h2>

        <p>HA 自带的历史记录功能比较简陋，如果想要更专业的数据分析，可以接入 InfluxDB 和 Grafana。</p>

        <p>我用这套方案监控了家里的温湿度、PM2.5、电量消耗等数据。可以看到每天的变化趋势，还能设置告警（比如 PM2.5 超标时发送通知）。</p>

        <p>配置方法：</p>

        <ol>
            <li>在 Proxmox 里装一个 InfluxDB 容器</li>
            <li>在 HA 的配置文件里添加 InfluxDB 集成</li>
            <li>装 Grafana，添加 InfluxDB 数据源</li>
            <li>导入 HA 的 Grafana 模板（GitHub 上有很多）</li>
        </ol>

        <h2>总结：三个月的折腾值得吗？</h2>

        <p>说实话，折腾 HA 的过程挺累的。光是看文档、调试配置就花了无数个晚上。但当你看到家里的设备都能按照你的想法自动运行时，那种成就感是无法替代的。</p>

        <p>现在我的 HA 已经稳定运行半年了，基本上不需要维护。每天回家灯会自动亮起，睡觉时空调会自动调节，早上窗帘会缓缓打开。这种"无感"的智能体验，才是我想要的。</p>

        <p><strong>给想入坑的朋友几个建议：</strong></p>

        <ul>
            <li>硬件选择：预算够的话直接上 N100 小主机，树莓派性能真的不够</li>
            <li>设备选择：优先选支持本地控制的设备（Zigbee、HomeKit），避免云端依赖</li>
            <li>学习路径：先把基础功能跑起来，再慢慢加自动化。不要一开始就想做很复杂的东西</li>
            <li>备份很重要：定期备份配置文件，我是每周自动备份到 NAS</li>
            <li>加入社区：HA 的中文社区很活跃，遇到问题可以去论坛或 Telegram 群求助</li>
        </ul>

        <p>最后放一张我的 HA 仪表盘截图（此处应有图片）。如果你也在折腾 HA，欢迎在评论区交流！</p>
