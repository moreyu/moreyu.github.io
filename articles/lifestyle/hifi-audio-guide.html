    <script>
        // Mobile menu toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const desktopNav = document.getElementById('desktop-nav');

        // Show/hide mobile menu button based on screen size
        function updateNavDisplay() {
            if (window.innerWidth < 768) {
                mobileMenuBtn.style.display = 'block';
                desktopNav.style.display = 'none';
            } else {
                mobileMenuBtn.style.display = 'none';
                desktopNav.style.display = 'flex';
                mobileMenu.style.display = 'none';
            }
        }

        mobileMenuBtn.addEventListener('click', () => {
            if (mobileMenu.style.display === 'none' || !mobileMenu.style.display) {
                mobileMenu.style.display = 'block';
                mobileMenuBtn.querySelector('svg').innerHTML = '<path d="M6 18L18 6M6 6l12 12"/>';
            } else {
                mobileMenu.style.display = 'none';
                mobileMenuBtn.querySelector('svg').innerHTML = '<path d="M4 6h16M4 12h16M4 18h16"/>';
            }
        });

        // Close mobile menu when clicking a link
        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.style.display = 'none';
                mobileMenuBtn.querySelector('svg').innerHTML = '<path d="M4 6h16M4 12h16M4 18h16"/>';
            });
        });

        window.addEventListener('resize', updateNavDisplay);
        updateNavDisplay();
    </script>

                                <li><strong>吸音处理：</strong>墙面、天花板使用吸音板，减少反射</li>
                                <li><strong>扩散处理：</strong>使用扩散板，让声音更均匀</li>
                                <li><strong>低频陷阱：</strong>房间角落放置低频陷阱，控制低频</li>
                                <li><strong>地毯地垫：</strong>地面铺设地毯，减少地面反射</li>
                            </ul>

                            <h3>音箱摆位</h3>

                            <p>正确的音箱摆位能显著提升音质：</p>

                            <ul>
                                <li><strong>等边三角形：</strong>音箱与听音位置形成等边三角形</li>
                                <li><strong>离墙距离：</strong>音箱距离后墙至少50cm</li>
                                <li><strong>高度调整：</strong>高音单元与耳朵齐平</li>
                                <li><strong>内倾角度：</strong>音箱向内倾斜，指向听音位置</li>
                            </ul>

                            <h3>线材选择</h3>

                            <div className="info-box">
                                <p><strong> 理性看待线材</strong></p>
                                <p>线材对音质有影响，但不要迷信天价线材。选择合适的线材，把预算花在刀刃上。</p>
                            </div>

                        <section id="tips">
                            <h2>实用技巧</h2>

                            <h3>音源选择</h3>

                            <ul>
                                <li><strong>无损音乐：</strong>优先选择FLAC、APE等无损格式</li>
                                <li><strong>高解析音频：</strong>24bit/192kHz的Hi-Res音频</li>
                                <li><strong>流媒体：</strong>Apple Music、Tidal HiFi</li>
                                <li><strong>CD抓轨：</strong>使用EAC精确抓取CD</li>
                            </ul>

                            <h3>煲机</h3>

                            <div className="highlight-box">
                                <p><strong>关于煲机的真相</strong></p>
                                <p>新耳机、音箱确实需要一定时间"开声"，但不要迷信煲机。正常使用100小时后，器材就能达到最佳状态。</p>
                            </div>

                            <h3>常见误区</h3>

                            <ul>
                                <li><strong>误区1：</strong>越贵越好 → 适合自己的才是最好的</li>
                                <li><strong>误区2：</strong>线材决定音质 → 器材才是核心</li>
                                <li><strong>误区3：</strong>数字音源无差别 → 不同播放器声音有差异</li>
                                <li><strong>误区4：</strong>功放功率越大越好 → 匹配才是关键</li>
                            </ul>
                        </section>

                        <section id="conclusion">
                            <h2>总结</h2>

                            <p>
                                HiFi是一个循序渐进的过程，不要急于求成。从入门到发烧，每一步都要根据自己的需求和预算来规划。记住，音乐才是核心，器材只是工具。
                            </p>

                                    <li>理性看待线材，把预算花在刀刃上</li>
